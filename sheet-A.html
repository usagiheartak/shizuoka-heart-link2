<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静岡心不全連携シート</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.jsの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --a4-width: 210mm;
            --a4-height: 297mm;
        }

        body {
            background-color: #e5e7eb;
            /* 医療文書らしく、明朝体を優先しつつゴシックもフォールバックに設定 */
            font-family: 'Yu Mincho', 'MS PMincho', 'Hiragino Mincho ProN', 'Noto Sans JP', sans-serif;
            color: #000000;
        }

        /* ゴシック体にしたい部分用のクラス */
        .gothic-text {
            font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }

        /* 画面上部のボタン領域 */
        .controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 50;
            font-family: 'Noto Sans JP', sans-serif; /* ボタンはゴシック */
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .btn-edit { background-color: #3b82f6; }
        .btn-edit:hover { background-color: #2563eb; }
        .btn-print { background-color: #10b981; }
        .btn-print:hover { background-color: #059669; }
        .btn-pdf { background-color: #f59e0b; }
        .btn-pdf:hover { background-color: #d97706; }

        /* A4キャンバスコンテナ */
        .page-wrapper {
            margin-top: 80px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .a4-document {
            width: var(--a4-width);
            height: var(--a4-height); /* min-height から変更。確実に高さを確保して自由記載欄の消失を防ぐ */
            background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 15mm 18mm;
            box-sizing: border-box;
            position: relative;
            /* 内部レイアウト用のフレックスボックス */
            display: flex;
            flex-direction: column;
        }

        /* 入力フォームの共通スタイル（帳票らしく白黒・角丸なしに） */
        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            background-color: #ffffff; 
            border: 1px solid #333333;
            border-radius: 0px; /* 角丸なし */
            padding: 4px 8px;
            font-size: 14px;
            color: #000;
            outline: none;
            font-family: inherit;
        }
        
        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            border-color: #000;
            background-color: #f9fafb;
        }

        /* チェックボックスのスタイル */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #000000; /* 黒系に変更 */
        }
        input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #000000;
        }

        /* テーブルスタイル */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #333333; /* 枠線を濃く */
            padding: 8px;
            font-size: 14px;
        }
        th {
            background-color: #f9fafb; /* ごく薄いグレー */
            font-weight: bold;
            text-align: center;
            width: 120px;
        }
        .bg-gray-50 {
            background-color: #f9fafb !important;
        }

        /* セクション見出し（帳票らしくシンプルに） */
        .section-title {
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #333333;
            padding-bottom: 4px;
            margin-bottom: 12px;
            margin-top: 16px;
            display: inline-block;
        }

        /* プレビュー（印刷・PDF）モードのスタイル */
        .print-mode input[type="text"], 
        .print-mode input[type="date"], 
        .print-mode select, 
        .print-mode textarea {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
            resize: none;
            color: #000;
            appearance: none;
            -webkit-appearance: none;
        }

        /* プレビュー時にプレースホルダー（薄い文字）を消す */
        .print-mode input::placeholder,
        .print-mode textarea::placeholder {
            color: transparent !important;
        }

        /* 日付入力欄のカレンダーアイコンを消す */
        .print-mode input[type="date"]::-webkit-calendar-picker-indicator {
            display: none;
        }
        /* 枠線が必要な入力欄の下線を残すなどの微調整 */
        .print-mode .underline-input {
            border-bottom: 1px solid #000 !important;
            border-radius: 0;
        }
        
        /* 印刷用CSS */
        @media print {
            body {
                background-color: transparent;
            }
            .controls {
                display: none;
            }
            .page-wrapper {
                margin: 0;
            }
            .a4-document {
                box-shadow: none;
                margin: 0;
                padding: 10mm 15mm; /* プリンタの余白を考慮して少し狭める */
                width: 210mm;
                height: 297mm; /* 印刷時も高さを固定して内容が潰れるのを防ぐ */
            }
            @page {
                size: A4 portrait;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <!-- コントロールパネル（印刷時には非表示） -->
    <div class="controls no-print">
        <button id="toggleEditBtn" class="btn btn-edit" onclick="toggleEditMode()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
            </svg>
            <span id="toggleEditText">プレビュー確認（枠線を消す）</span>
        </button>
        <button class="btn btn-print" onclick="printBrowser()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z" clip-rule="evenodd" />
            </svg>
            ブラウザ印刷
        </button>
        <button class="btn btn-pdf" onclick="generatePDF()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
            PDF保存
        </button>
    </div>

    <!-- A4ドキュメント領域 -->
    <div class="page-wrapper">
        <div id="document-content" class="a4-document">
            
            <!-- ヘッダー部分 -->
            <div class="text-center mb-6 gothic-text">
                <h1 class="text-2xl font-bold tracking-widest">【静岡心不全連携シート】</h1>
                <div class="text-lg mt-2 font-bold">(かかりつけ医→専門医)</div>
            </div>

            <!-- 日付 -->
            <div class="flex justify-end mb-4">
                <div class="flex items-center gap-2">
                    <span class="text-sm whitespace-nowrap">作成日:</span>
                    <input type="date" class="w-40 text-right">
                </div>
            </div>

            <!-- 宛先と差出人 -->
            <div class="flex justify-between mb-6 gap-8">
                <!-- 紹介先 -->
                <div class="w-1/2 flex flex-col gap-2">
                    <div class="flex items-end gap-2">
                        <span class="text-sm w-16">紹介先:</span>
                        <input type="text" class="underline-input flex-1" placeholder="医療機関名">
                    </div>
                    <div class="flex items-end gap-2 pl-16">
                        <input type="text" class="underline-input flex-1" placeholder="診療科">
                        <span class="text-sm">科</span>
                    </div>
                    <div class="flex items-end gap-2 pl-16">
                        <input type="text" class="underline-input flex-1" placeholder="担当医名">
                        <span class="text-sm whitespace-nowrap">先生 御侍史</span>
                    </div>
                </div>

                <!-- 紹介元 -->
                <div class="w-1/2 border border-gray-800 p-3 flex flex-col gap-2">
                    <div class="font-bold text-sm mb-1">紹介元機関</div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm w-16">名称:</span>
                        <input type="text" class="flex-1" placeholder="医療機関名">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm w-16">住所:</span>
                        <input type="text" class="flex-1" placeholder="所在地">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm w-16">TEL:</span>
                        <input type="text" class="flex-1" placeholder="電話番号">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm w-16">医師名:</span>
                        <input type="text" class="flex-1" placeholder="氏名">
                    </div>
                </div>
            </div>

            <!-- 患者基本情報 -->
            <div class="mb-6">
                <table>
                    <tbody>
                        <tr>
                            <th rowspan="2">患者情報</th>
                            <td class="w-20 bg-gray-50 text-center text-xs text-gray-700 whitespace-nowrap">フリガナ</td>
                            <td colspan="3"><input type="text" placeholder="カタカナ"></td>
                        </tr>
                        <tr>
                            <td class="bg-gray-50 text-center">氏名</td>
                            <td colspan="3">
                                <div class="flex items-center gap-2">
                                    <input type="text" class="flex-1" placeholder="氏名">
                                    <span>様</span>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>生年月日</th>
                            <td colspan="2">
                                <div class="flex items-center gap-2">
                                    <div class="flex items-center gap-2 mr-2">
                                        <label class="flex items-center gap-1 cursor-pointer">
                                            <input type="radio" name="era" value="大">
                                            <span>大</span>
                                        </label>
                                        <label class="flex items-center gap-1 cursor-pointer">
                                            <input type="radio" name="era" value="昭">
                                            <span>昭</span>
                                        </label>
                                        <label class="flex items-center gap-1 cursor-pointer">
                                            <input type="radio" name="era" value="平">
                                            <span>平</span>
                                        </label>
                                        <label class="flex items-center gap-1 cursor-pointer">
                                            <input type="radio" name="era" value="令">
                                            <span>令</span>
                                        </label>
                                    </div>
                                    <input type="text" class="w-12 text-center" placeholder="年"><span>年</span>
                                    <input type="text" class="w-10 text-center" placeholder="月"><span>月</span>
                                    <input type="text" class="w-10 text-center" placeholder="日"><span>日</span>
                                </div>
                            </td>
                            <td class="w-32">
                                <div class="flex items-center gap-1 justify-center">
                                    <span>(</span>
                                    <input type="text" class="w-12 text-center" placeholder="年齢">
                                    <span>歳 )</span>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>性別</th>
                            <td colspan="3">
                                <div class="flex items-center gap-6 px-2">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="gender" value="男">
                                        <span>男</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" name="gender" value="女">
                                        <span>女</span>
                                    </label>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- §紹介目的 -->
            <div class="mb-4">
                <div class="section-title">紹介目的</div>
                <div class="flex flex-col gap-3 pl-2">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] whitespace-nowrap">指示に従い、半年後の紹介</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] whitespace-nowrap">指示に従い、1年後の紹介</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] whitespace-nowrap">利尿剤追加でも改善しない浮腫</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] whitespace-nowrap">1週間で２kg以上体重が増加した</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] whitespace-nowrap">心不全によるかもしれない息切れの増悪</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] tracking-tight whitespace-nowrap">BNP値が前回の 40%以上, NT-proBNP値が前回の 30%以上上昇</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] tracking-tight whitespace-nowrap">かかりつけ医もしくは患者希望で心エコー含む定期検査目的</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" class="">
                        <span class="text-[14px] whitespace-nowrap">その他</span>
                        <input type="text" class="underline-input flex-1 ml-2" placeholder="その他の目的を記載">
                    </label>
                </div>
            </div>

            <!-- §自由記載 -->
            <div class="flex-1 flex flex-col mt-2">
                <div class="section-title">自由記載</div>
                <textarea class="flex-1 w-full border border-gray-800 p-3" placeholder="詳細な症状、経過、現在の処方内容、特記事項などをご記入ください..."></textarea>
            </div>

        </div>
    </div>

    <script>
        let isEditMode = true;
        const documentContent = document.getElementById('document-content');
        const toggleBtn = document.getElementById('toggleEditBtn');
        const toggleText = document.getElementById('toggleEditText');

        // プレースホルダーを一時的に消去する関数（PDF/印刷時に確実に消すため）
        function removePlaceholders() {
            const inputs = documentContent.querySelectorAll('input, textarea');
            inputs.forEach(el => {
                if (el.placeholder) {
                    el.dataset.placeholder = el.placeholder;
                    el.placeholder = '';
                }
            });
        }

        // プレースホルダーを復元する関数
        function restorePlaceholders() {
            const inputs = documentContent.querySelectorAll('input, textarea');
            inputs.forEach(el => {
                if (el.dataset.placeholder) {
                    el.placeholder = el.dataset.placeholder;
                    delete el.dataset.placeholder; // 復元後は一時データを削除
                }
            });
        }

        // 編集モード（枠線の表示/非表示）の切り替え
        function toggleEditMode() {
            isEditMode = !isEditMode;
            if (isEditMode) {
                documentContent.classList.remove('print-mode');
                toggleText.textContent = "プレビュー確認（枠線を消す）";
                toggleBtn.classList.replace('bg-blue-600', 'bg-blue-500');
                restorePlaceholders();
            } else {
                documentContent.classList.add('print-mode');
                toggleText.textContent = "編集モードに戻る";
                toggleBtn.classList.replace('bg-blue-500', 'bg-blue-600');
                removePlaceholders();
            }
        }

        // 印刷時のイベント（印刷ダイアログ表示前にプレビューモードにする）
        window.addEventListener('beforeprint', () => {
            if (isEditMode) {
                documentContent.classList.add('print-mode');
                removePlaceholders();
            }
        });

        // 印刷ダイアログを閉じた後に元のモードに戻す
        window.addEventListener('afterprint', () => {
            if (isEditMode) {
                documentContent.classList.remove('print-mode');
                restorePlaceholders();
            }
        });

        // ブラウザ印刷の実行
        function printBrowser() {
            // beforeprintイベントが自動で発火するため、そのまま印刷を呼び出す
            window.print();
        }

        // html2pdfを用いたPDF保存
        async function generatePDF() {
            const wasEditMode = isEditMode;
            
            // 1. PDF用にスタイルを調整（入力枠・プレースホルダーを消す）
            if (wasEditMode) {
                documentContent.classList.add('print-mode');
                removePlaceholders();
            }
            
            // 2. 確実に1ページに収めるためのJavaScriptによる高さの意図的な縮小処理
            // A4高さ(297mm)からわずかに小さくし、オーバーフローを隠す
            const originalHeight = documentContent.style.height;
            const originalMinHeight = documentContent.style.minHeight;
            const originalOverflow = documentContent.style.overflow;
            
            documentContent.style.height = '296.5mm';
            documentContent.style.minHeight = '296.5mm';
            documentContent.style.overflow = 'hidden';

            // PDF生成オプション
            const opt = {
                margin: 0,
                filename: '静岡心不全連携シート(かかりつけ医→専門医).pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                // PDF生成
                await html2pdf().set(opt).from(documentContent).save();
            } catch (error) {
                console.error("PDF生成中にエラーが発生しました:", error);
                alert("PDFの生成に失敗しました。");
            } finally {
                // 3. スタイルを元に戻す
                documentContent.style.height = originalHeight;
                documentContent.style.minHeight = originalMinHeight;
                documentContent.style.overflow = originalOverflow;
                
                if (wasEditMode) {
                    documentContent.classList.remove('print-mode');
                    restorePlaceholders();
                }
            }
        }
    </script>
</body>
</html>
